<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geely EX2 Charging Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #0B0A1A;
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    .history-scroll::-webkit-scrollbar { width: 6px; }
    .history-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
    .history-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script id="jsx-source" type="text/plain">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, linkWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const app = firebaseConfig ? initializeApp(firebaseConfig) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'geely-ex2-default';

    const { useState, useEffect, useMemo, useRef, memo } = React;

    const EV_SPECS = { CAPACITY: 39.4, MAX_AC_POWER: 6.6, MAX_DC_POWER: 70.0, AC_EFFICIENCY: 0.84, DC_EFFICIENCY: 0.95, TRICKLE_RATE: 0.35, COST_EFFICIENCY: 0.90, VAMPIRE_DRAIN_KW: 0.3 };

    const Zap = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
    const Clock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const Wallet = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-8"></path><path d="M18 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"></path></svg>;
    const HistoryIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>;
    const TrashIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const EditIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const SaveIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const CheckIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const XIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

    function useSystemData() {
      const [user, setUser] = useState(null);
      const [history, setHistory] = useState([]);
      const [isReady, setIsReady] = useState(false);

      useEffect(() => {
        if (!auth) {
          setUser({ uid: 'local_session' });
          setIsReady(true);
          return;
        }
        const unsubscribe = onAuthStateChanged(auth, (u) => {
           if(u) { setUser(u); setIsReady(true); } 
           else { signInAnonymously(auth); }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!isReady || !user || !db || user.uid === 'local_session') return;
        const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory');
        const unsubscribe = onSnapshot(colRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => b.timestamp - a.timestamp);
          setHistory(data);
        }, (error) => console.error(error));
        return () => unsubscribe();
      }, [user, isReady]);

      const signOutUser = async () => {
          await signOut(auth);
          setHistory([]);
      };

      const addRecord = async (record) => {
        if (db && user && user.uid !== 'local_session') await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory'), record);
        else setHistory(prev => [{id: Date.now().toString(), ...record}, ...prev].sort((a,b) => b.timestamp - a.timestamp));
      };

      const deleteRecord = async (id) => {
        if (db && user && user.uid !== 'local_session') await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id));
        else setHistory(prev => prev.filter(item => item.id !== id));
      };

      const updateRecord = async (id, newCost) => {
        if (db && user && user.uid !== 'local_session') await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id), { cost: newCost });
        else setHistory(prev => prev.map(item => item.id === id ? { ...item, cost: newCost } : item));
      };

      return { user, history, isReady, addRecord, deleteRecord, updateRecord, signOutUser };
    }

    function App() {
      const systemDB = useSystemData();
      const [showHistory, setShowHistory] = useState(false);
      const [activeItemId, setActiveItemId] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [editCost, setEditCost] = useState("");

      const groupedHistory = useMemo(() => {
        const groups = {};
        systemDB.history.forEach(item => {
          const date = new Date(item.timestamp);
          const monthYear = date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
          const sortKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
          if (!groups[sortKey]) groups[sortKey] = { label: monthYear, items: [], total: 0 };
          groups[sortKey].items.push(item);
          groups[sortKey].total += Number(item.cost) || 0;
        });
        return Object.entries(groups).sort(([a], [b]) => b.localeCompare(a)).map(([_, val]) => val);
      }, [systemDB.history]);

      return (
        <div className="min-h-screen bg-[#0B0A1A] p-4 text-white">
          {/* Main UI omitted for brevity, focusing on History Modal */}
          {showHistory && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
               <div className="bg-[#120F24] border border-white/10 w-full max-w-md h-[85vh] flex flex-col rounded-[32px] overflow-hidden shadow-2xl">
                  <div className="p-5 border-b border-white/5 bg-white/5 shrink-0 flex justify-between items-center">
                      <div>
                        <div className="flex items-center gap-2 text-cyan-400 font-bold uppercase tracking-widest"><HistoryIcon className="w-5 h-5" /> ประวัติการชาร์จ</div>
                        <div className="text-[10px] text-cyan-400/60 font-medium uppercase tracking-widest mt-1">
                          บัญชี: {systemDB.user?.email || "บัญชีชั่วคราว (Guest)"}
                        </div>
                      </div>
                      <button onClick={() => setShowHistory(false)} className="text-white/50 hover:text-white p-2">✕</button>
                  </div>
                  
                  <div className="flex-1 overflow-y-auto p-4 history-scroll">
                      {groupedHistory.map((group, gIdx) => (
                          <div key={gIdx} className="mb-6">
                              <div className="flex justify-between items-center border-b border-white/10 pb-2 sticky top-0 bg-[#120F24]/90 z-20">
                                  <h3 className="text-xs font-bold text-cyan-300 uppercase">{group.label}</h3>
                                  <span className="text-xs font-black text-emerald-400">รวม ฿{group.total.toFixed(2)}</span>
                              </div>
                              <div className="space-y-3 mt-3">
                                {group.items.map(item => (
                                    <div key={item.id} onClick={() => setActiveItemId(activeItemId === item.id ? null : item.id)} className={`border rounded-2xl p-4 transition-all cursor-pointer ${activeItemId === item.id ? 'bg-white/5 border-cyan-500/50' : 'bg-black/40 border-white/5'}`}>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="text-[10px] text-white/40">{new Date(item.timestamp).toLocaleDateString('th-TH')}</div>
                                                <div className="text-xs font-bold text-white/80">{item.startSoC}% → {item.targetSoC}%</div>
                                            </div>
                                            <div className="text-lg font-black text-emerald-400">฿{Number(item.cost).toFixed(2)}</div>
                                        </div>
                                        {activeItemId === item.id && (
                                            <div className="flex justify-end gap-2 mt-3 pt-3 border-t border-white/5">
                                                <button onClick={(e) => { e.stopPropagation(); systemDB.deleteRecord(item.id); }} className="p-1.5 text-rose-500"><TrashIcon className="w-4 h-4"/></button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                              </div>
                          </div>
                      ))}
                  </div>
                  {systemDB.user && !systemDB.user.isAnonymous && (
                    <button onClick={systemDB.signOutUser} className="m-4 py-2 text-rose-400 text-xs font-bold uppercase border border-rose-900/50 rounded-lg hover:bg-rose-900/20">ออกจากระบบ</button>
                  )}
               </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script type="module">
    const source = document.getElementById('jsx-source').textContent;
    const compiled = Babel.transform(source, { presets: [['react', { "runtime": "classic" }]], sourceType: "module" }).code;
    const script = document.createElement('script'); script.type = 'module'; script.text = compiled;
    document.body.appendChild(script);
  </script>
</body>
</html>
