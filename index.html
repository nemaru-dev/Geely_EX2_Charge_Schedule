<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geely EX2 Charging Tracker (GitHub Ready)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #0B0A1A;
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    .history-scroll::-webkit-scrollbar { width: 6px; }
    .history-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
    .history-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script id="jsx-source" type="text/plain">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, linkWithPopup, onAuthStateChanged, signOut, signInWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // =====================================================================
    // 🛑 1. นำข้อมูล Firebase Config ของคุณมาวางที่นี่ สำหรับรันบน GitHub 🛑
    // =====================================================================
    const MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBIOOnXGxET8lN-K6h-HRX8dyfrYQlLxZc",
      authDomain: "geely-tracker.firebaseapp.com",
      projectId: "geely-tracker",
      storageBucket: "geely-tracker.firebasestorage.app",
      messagingSenderId: "1066830584325",
      appId: "1:1066830584325:web:cf20ac2cb77d9142399a6c",
      measurementId: "G-WVJLH5HPS4"
    };

    let app = null, auth = null, db = null;
    const isFirebaseValid = Object.keys(MY_FIREBASE_CONFIG).length > 0 && MY_FIREBASE_CONFIG.apiKey;
    
    if (isFirebaseValid) {
        try {
            app = initializeApp(MY_FIREBASE_CONFIG);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { console.error("Firebase Init Error", e); }
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'geely-ex2-github-app';

    const { useState, useEffect, useMemo, useRef, memo } = React;

    // --- EV Constants ---
    const EV_SPECS = {
      CAPACITY: 39.4,
      MAX_AC_POWER: 6.6,
      MAX_DC_POWER: 70.0,
      AC_EFFICIENCY: 0.84,
      DC_EFFICIENCY: 0.95,
      TRICKLE_RATE: 0.35,
      COST_EFFICIENCY: 0.90,
      VAMPIRE_DRAIN_KW: 0.3
    };

    const Zap = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
    const Clock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const Wallet = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-8"></path><path d="M18 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"></path></svg>;
    const SaveIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const HistoryIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>;
    const TrashIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const EditIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const CheckIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const XIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const ShieldAlert = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>;
    const BarChartIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
    const ListIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    
    const GoogleIcon = ({className}) => (
      <svg className={className} viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    );

    function useSystemData() {
      const [user, setUser] = useState(null);
      const [history, setHistory] = useState([]);
      const [isReady, setIsReady] = useState(false);
      const [storageMode, setStorageMode] = useState('local'); 
      const [isAuthLoading, setIsAuthLoading] = useState(false);
      const [authError, setAuthError] = useState(null);

      const loadLocalData = () => {
          const savedData = localStorage.getItem('geely_ex2_history');
          if (savedData) {
              try { setHistory(JSON.parse(savedData)); } catch(e){}
          }
          setUser({ uid: 'local_user', isAnonymous: true });
          setStorageMode('local');
          setIsReady(true);
      };

      useEffect(() => {
        if (!auth) {
          loadLocalData();
          return;
        }

        const unsubscribe = onAuthStateChanged(auth, async (u) => {
           if(u) {
               setUser(u);
               setStorageMode('cloud');
               setAuthError(null);
           } else {
               try { 
                   await signInAnonymously(auth); 
               } catch (error) { 
                   if (error.code === 'auth/admin-restricted-operation') {
                       setAuthError('คุณยังไม่ได้เปิดใช้งานบัญชีชั่วคราว (Anonymous) ใน Firebase Authentication');
                   } else if (error.message && error.message.includes('requests-from-referer')) {
                       setAuthError('โดเมน Preview นี้ถูกบล็อกโดยระบบรักษาความปลอดภัยของ API Key ที่คุณตั้งไว้ (ให้นำโค้ดไปรันบนเว็บ GitHub ของคุณแทน)');
                   } else {
                       setAuthError(error.message);
                   }
                   loadLocalData(); 
               }
           }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (storageMode !== 'cloud' || !user || !db || user.uid === 'local_user') return;
        const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory');
        const unsubscribe = onSnapshot(colRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => b.timestamp - a.timestamp);
          setHistory(data);
          setIsReady(true); // data loaded
        }, (error) => {
          if (error.code === 'permission-denied') {
              console.warn("Firestore Permission Denied. Falling back to local storage.");
              setAuthError('คุณยังไม่ได้ปลดล็อกสิทธิ์ Firestore Rules');
              loadLocalData();
          } else {
              console.error("Firestore Error", error);
          }
        });
        
        return () => unsubscribe();
      }, [user, storageMode]);

      const handleGoogleSignIn = async () => {
        if (!auth) return;
        
        const isIframe = window.self !== window.top;
        if (isIframe) {
            alert("⚠️ คำเตือน: คุณกำลังรันระบบในหน้าต่างจำลอง (Iframe)\n\nเบราว์เซอร์จะบล็อก Google Login เพื่อความปลอดภัย\n\n👉 วิธีทดสอบที่ถูกต้อง: บันทึกไฟล์นี้ลงคอมพิวเตอร์ หรืออัปโหลดขึ้น GitHub แล้วเปิดใช้งานบนเบราว์เซอร์โดยตรงครับ");
        }

        setIsAuthLoading(true);
        const provider = new GoogleAuthProvider();
        try {
          if (auth.currentUser && auth.currentUser.isAnonymous) {
             await linkWithPopup(auth.currentUser, provider);
          } else {
             await signInWithPopup(auth, provider);
          }
        } catch (error) {
          if (error.code === 'auth/credential-already-in-use') {
             const credential = GoogleAuthProvider.credentialFromError(error);
             if (credential) {
                 try {
                     await signInWithCredential(auth, credential);
                 } catch (signInError) {
                     console.error("Silent Sign-in Error", signInError);
                     alert("ไม่สามารถล็อกอินได้: " + signInError.message);
                 }
             } else {
                 await signInWithPopup(auth, provider);
             }
          } else if (error.code === 'auth/unauthorized-domain') {
             alert("❌ โดเมนนี้ยังไม่ได้รับอนุญาตให้ล็อกอิน!\n\nวิธีแก้ (ใน Firebase Console):\n1. ไปที่ Authentication -> Settings -> Authorized domains\n2. เพิ่มโดเมนที่คุณใช้อยู่ลงไปครับ");
          } else if (error.message && error.message.includes('requests-from-referer')) {
             alert("❌ ถูกบล็อกโดยระบบรักษาความปลอดภัยของ Google Cloud!\n\nเนื่องจากหน้าต่างนี้ไม่อยู่ในรายการที่ตั้งค่าไว้\n\n👉 วิธีแก้: นำไฟล์นี้ไปรันบน GitHub Pages ของคุณ มันจะสามารถเข้าใช้งานได้ตามปกติทันที");
          } else if (error.code === 'auth/popup-closed-by-user') {
             console.warn("Popup ปิดไปก่อนที่จะล็อกอินเสร็จ");
          } else {
             console.error("Google Auth Error", error);
             alert("ไม่สามารถล็อกอินได้: " + error.message);
          }
        } finally {
          setIsAuthLoading(false);
        }
      };

      const handleSignOut = async () => {
        if (!auth) return;
        try {
          await signOut(auth);
          setHistory([]);
        } catch (error) {
          console.error("Sign Out Error", error);
        }
      };

      const addRecord = async (record) => {
        const newRecordWithId = { id: Date.now().toString(), ...record };
        if (storageMode === 'cloud' && db && user && user.uid !== 'local_user') {
          try {
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory'), record);
          } catch(e) { 
            if (e.code === 'permission-denied') {
                setStorageMode('local');
                const updated = [newRecordWithId, ...history].sort((a,b) => b.timestamp - a.timestamp);
                setHistory(updated);
                localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
            } else {
                console.error(e); 
            }
          }
        } else {
          const updated = [newRecordWithId, ...history].sort((a,b) => b.timestamp - a.timestamp);
          setHistory(updated);
          localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
        }
      };

      const deleteRecord = async (id) => {
        if (storageMode === 'cloud' && db && user && user.uid !== 'local_user') {
           try { 
               await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id)); 
           } catch(error) { 
               console.error(error); 
           }
        } else {
           const updated = history.filter(item => item.id !== id);
           setHistory(updated);
           localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
        }
      };

      const updateRecord = async (id, newCost, newTimestamp) => {
        if (storageMode === 'cloud' && db && user && user.uid !== 'local_user') {
           try { 
               await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id), { 
                   cost: Number(newCost) || 0,
                   timestamp: Number(newTimestamp) || Date.now()
               }); 
           } catch(error) { 
               if (error.code === 'permission-denied') alert('อัปเดตข้อมูลไม่ได้ เพราะติดสิทธิ์ Firestore Rules');
               else console.error(error); 
           }
        } else {
           const updated = history.map(item => item.id === id ? { ...item, cost: Number(newCost) || 0, timestamp: Number(newTimestamp) || Date.now() } : item);
           updated.sort((a, b) => b.timestamp - a.timestamp); 
           setHistory(updated);
           localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
        }
      };

      return { user, history, isReady, storageMode, isAuthLoading, authError, handleGoogleSignIn, handleSignOut, addRecord, deleteRecord, updateRecord };
    }

    function useChargeCalculation(currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit) {
      return useMemo(() => {
        let currentStationPower = chargerType === 'DC' ? Number(dcPower) || 0 : Number(acPower) || 0;
        if (chargerType === 'AC' && acInputMode === 'A') { currentStationPower = (acAmps * 230) / 1000; }

        if (currentSoC >= targetSoC) return { hours: 0, minutes: 0, error: "แบตเตอรี่ถึงเป้าหมายแล้ว", actualPower: 0, bottleneck: null, cost: 0 };
        if (currentStationPower <= 0) return { hours: 0, minutes: 0, error: "ข้อมูลกำลังไฟไม่ถูกต้อง", actualPower: 0, bottleneck: null, cost: 0 };

        const energyNeeded = EV_SPECS.CAPACITY * ((targetSoC - currentSoC) / 100);
        let actualPower = 0; let bottleneck = '';

        if (chargerType === 'AC') {
          if (currentStationPower > EV_SPECS.MAX_AC_POWER) { actualPower = EV_SPECS.MAX_AC_POWER; bottleneck = `รถรับไฟ AC ได้สูงสุด ${EV_SPECS.MAX_AC_POWER} kW`; } 
          else { actualPower = currentStationPower; bottleneck = 'จำกัดตามกำลังเครื่องชาร์จ'; }
        } else {
          if (currentStationPower > EV_SPECS.MAX_DC_POWER) { actualPower = EV_SPECS.MAX_DC_POWER; bottleneck = `รถรับไฟ DC ได้สูงสุด ${EV_SPECS.MAX_DC_POWER} kW`; } 
          else { actualPower = currentStationPower; bottleneck = 'จำกัดตามกำลังตู้ชาร์จ'; }
        }

        let timeInHours = 0;
        if (chargerType === 'AC') {
          timeInHours = energyNeeded / (actualPower * EV_SPECS.AC_EFFICIENCY);
        } else {
          const effectiveDcPower = actualPower * EV_SPECS.DC_EFFICIENCY;
          if (currentSoC < 80 && targetSoC <= 80) { timeInHours = energyNeeded / effectiveDcPower; } 
          else if (currentSoC >= 80) { timeInHours = energyNeeded / (effectiveDcPower * EV_SPECS.TRICKLE_RATE); } 
          else {
            const timeFast = (EV_SPECS.CAPACITY * ((80 - currentSoC) / 100)) / effectiveDcPower;
            const timeSlow = (EV_SPECS.CAPACITY * ((targetSoC - 80) / 100)) / (effectiveDcPower * EV_SPECS.TRICKLE_RATE);
            timeInHours = timeFast + timeSlow;
          }
        }

        const totalMinutes = Math.round(timeInHours * 60);
        const cost = ((energyNeeded / EV_SPECS.COST_EFFICIENCY) + (timeInHours * EV_SPECS.VAMPIRE_DRAIN_KW)) * (Number(pricePerUnit) || 0);

        return { 
          hours: Math.floor(totalMinutes / 60), 
          minutes: totalMinutes % 60, 
          actualPower, 
          bottleneck, 
          error: null, 
          cost 
        };
      }, [currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit]);
    }

    const GaugeCanvas = memo(({ currentSoC, targetSoC, chargerType }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const cssWidth = 320; const cssHeight = 160; const dpr = window.devicePixelRatio || 1;
        canvas.width = cssWidth * dpr; canvas.height = cssHeight * dpr; 
        
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, cssWidth, cssHeight);

        const centerX = cssWidth / 2; const centerY = cssHeight - 10; const radius = cssWidth / 2 - 30;
        const mainGradient = ctx.createLinearGradient(0, centerY, cssWidth, centerY);
        mainGradient.addColorStop(0, '#06b6d4'); mainGradient.addColorStop(0.5, '#8b5cf6'); mainGradient.addColorStop(1, '#ec4899');
        
        ctx.beginPath(); ctx.arc(centerX, centerY, radius, Math.PI, 0); ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
        ctx.beginPath(); ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + (Math.PI * 0.8)); ctx.lineWidth = 18; ctx.lineCap = 'butt'; ctx.strokeStyle = 'rgba(236, 72, 153, 0.08)'; ctx.stroke();
        
        const currentAngle = Math.PI + (Math.PI * (currentSoC / 100));
        ctx.beginPath(); ctx.arc(centerX, centerY, radius, Math.PI, currentAngle); ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.strokeStyle = mainGradient; ctx.shadowColor = '#ec4899'; ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0; 
        
        if (targetSoC > currentSoC) {
          const targetAngle = Math.PI + (Math.PI * (targetSoC / 100));
          ctx.beginPath(); ctx.arc(centerX, centerY, radius, currentAngle, targetAngle); ctx.lineWidth = 18; ctx.lineCap = targetSoC >= 100 ? 'round' : 'butt'; ctx.setLineDash([4, 4]);
          const forecastGradient = ctx.createLinearGradient(0, 0, cssWidth, 0);
          forecastGradient.addColorStop(0, '#a855f7'); forecastGradient.addColorStop(1, targetSoC > 80 ? '#fb923c' : '#ec4899'); 
          ctx.strokeStyle = forecastGradient; ctx.stroke(); ctx.setLineDash([]);
        }
        
        if (chargerType === 'DC') {
          const markerAngle = Math.PI + (Math.PI * 0.8);
          const markerX = centerX + Math.cos(markerAngle) * (radius - 14); const markerY = centerY + Math.sin(markerAngle) * (radius - 14);
          const markerOuterX = centerX + Math.cos(markerAngle) * (radius + 14); const markerOuterY = centerY + Math.sin(markerAngle) * (radius + 14);
          ctx.beginPath(); ctx.moveTo(markerX, markerY); ctx.lineTo(markerOuterX, markerOuterY); ctx.lineWidth = 4; ctx.strokeStyle = '#f43f5e'; ctx.shadowColor = '#f43f5e'; ctx.shadowBlur = 8; ctx.stroke(); ctx.shadowBlur = 0;
          ctx.fillStyle = '#fca5a5'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('BMS LIMIT', markerOuterX + 25, markerOuterY - 5);
        }
      }, [currentSoC, targetSoC, chargerType]);

      return <canvas ref={canvasRef} className="w-full max-w-[320px] aspect-[2/1] drop-shadow-2xl z-10" />;
    });

      const [historyTab, setHistoryTab] = useState("records"); // 'records' | 'summary'

      const [currentSoC, setCurrentSoC] = useState(30);
      const [targetSoC, setTargetSoC] = useState(80);

      const [acInputMode, setAcInputMode] = useState('A'); 
      const [acAmps, setAcAmps] = useState(10); 
      const [scheduleMode, setScheduleMode] = useState('FINISH_BY'); 
      const [targetTime, setTargetTime] = useState('06:30'); 
      const [userStartTime, setUserStartTime] = useState(new Date().toTimeString().slice(0, 5)); 
      const [pricePerUnit, setPricePerUnit] = useState(4.5);

      // Derived Logic
      const calcDetails = useChargeCalculation(currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit);

      const groupedHistory = useMemo(() => {
        const groups = {};
        systemDB.history.forEach(item => {
          const date = new Date(item.timestamp);
          const monthYear = date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
          const sortKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;

          if (!groups[sortKey]) {
            groups[sortKey] = { 
              label: monthYear, 
              items: [], 
              total: 0,
              totalKwh: 0
            };
          }
          groups[sortKey].items.push(item);
          groups[sortKey].total += Number(item.cost) || 0;
          
          // Estimate kWh charged based on Cost / PricePerUnit
          const unitPrice = Number(item.pricePerUnit) || 4.5;
          const derivedKwh = (Number(item.cost) || 0) / unitPrice;
          groups[sortKey].totalKwh += derivedKwh;
        });

        return Object.entries(groups)
          .sort(([keyA], [keyB]) => keyB.localeCompare(keyA))
          .map(([key, value]) => value);
      }, [systemDB.history]);

      const handleSaveSession = async () => {
        if (!systemDB.user || calcDetails.error || isSaving) return;
        setIsSaving(true);
        const newRecord = {
          timestamp: Date.now(),
          cost: calcDetails.cost,
          startSoC: currentSoC,
          targetSoC: targetSoC,
          chargerType,
          power: chargerType === 'AC' ? (acInputMode === 'A' ? `${acAmps}A` : `${acPower}kW`) : `${dcPower}kW`,
          pricePerUnit
        };
        await systemDB.addRecord(newRecord);
        setTimeout(() => setIsSaving(false), 500);
      };

      const schedule = useMemo(() => {
        if (calcDetails.error || (calcDetails.hours === 0 && calcDetails.minutes === 0)) return null;
        const totalChargeMinutes = (calcDetails.hours * 60) + calcDetails.minutes;
        if (scheduleMode === 'FINISH_BY') {
          const [tHours, tMinutes] = targetTime.split(':').map(Number);
          let startMinutesTotal = (tHours * 60 + tMinutes) - totalChargeMinutes;
          let dayOffset = '';
          if (startMinutesTotal < 0) { startMinutesTotal = (24 * 60) + (startMinutesTotal % (24 * 60)); dayOffset = '(คืนก่อนหน้า)'; }
          return {
            inputLabel: `ต้องการใช้รถเวลา (${targetSoC}%)`, outputLabel: 'ตั้งเวลาเริ่มชาร์จ (ในแอพ)',
            outputTime: `${String(Math.floor(startMinutesTotal / 60) % 24).padStart(2, '0')}:${String(startMinutesTotal % 60).padStart(2, '0')}`, dayOffset,
            inputValue: targetTime, setInputValue: setTargetTime, colorInput: 'text-pink-400', colorOutput: 'text-cyan-400', gradientOutput: 'from-cyan-300 to-blue-400'
          };
        } else {
          const [sHours, sMinutes] = userStartTime.split(':').map(Number);
          let endMinutesTotal = (sHours * 60 + sMinutes) + totalChargeMinutes;
          return {
            inputLabel: 'เสียบสายเริ่มชาร์จเวลา', outputLabel: `ชาร์จเสร็จถึงเป้า (${targetSoC}%)`,

            inputValue: userStartTime, setInputValue: setUserStartTime, colorInput: 'text-cyan-400', colorOutput: 'text-pink-400', gradientOutput: 'from-pink-300 to-fuchsia-400'

                          <button onClick={() => setShowHistory(false)} className="text-white/50 hover:text-white p-2 text-xl font-bold transition-colors">✕</button>
                      </div>
                      
                      {systemDB.user && !systemDB.user.isAnonymous && systemDB.storageMode === 'cloud' && (
                          <div className="flex items-center justify-between bg-emerald-900/20 p-2.5 rounded-xl border border-emerald-500/20">
                              <span className="text-xs text-emerald-400 font-mono tracking-wider break-all mr-3" title={systemDB.user.email}>
                                  {systemDB.user.email}
                              </span>
                              <button onClick={systemDB.handleSignOut} className="shrink-0 text-[10px] bg-rose-500/10 hover:bg-rose-500/20 text-rose-300 border border-rose-500/30 px-3 py-1.5 rounded-lg transition-colors font-bold uppercase tracking-widest">
                                  ออกจากระบบ
                              </button>
                          </div>
                      )}
                  </div>
                  
                  {/* Top Combined Summation Card */}
                  <div className="p-6 bg-gradient-to-br from-emerald-900/20 to-teal-900/20 border-b border-white/5 text-center relative shrink-0">
                      <div className="text-[10px] text-emerald-400/70 font-bold uppercase tracking-widest mb-2 relative z-10">ยอดใช้จ่ายสะสมทั้งหมด</div>
                      <div className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-emerald-400 font-mono relative z-10 drop-shadow-md">
                          <span className="text-2xl mr-1 text-emerald-500/70">฿</span>
                          {systemDB.history.reduce((sum, item) => sum + (Number(item.cost)||0), 0).toFixed(2)}
                      </div>
                  </div>

                  {/* ⚡ Premium iOS-style Segment Switcher */}
                  <div className="px-4 py-3 shrink-0 bg-white/5 border-b border-white/5">
                      <div className="flex p-0.5 bg-black/40 rounded-xl">
                          <button 
                              onClick={() => setHistoryTab("records")}
                              className={`flex-1 flex items-center justify-center gap-2 py-2 text-xs font-bold rounded-lg transition-all ${historyTab === 'records' ? 'bg-cyan-500 text-black shadow-md' : 'text-gray-400 hover:text-white'}`}
                          >
                              <ListIcon className="w-4 h-4" />
                              รายการทั้งหมด
                          </button>
                          <button 
                              onClick={() => setHistoryTab("summary")}
                              className={`flex-1 flex items-center justify-center gap-2 py-2 text-xs font-bold rounded-lg transition-all ${historyTab === 'summary' ? 'bg-cyan-500 text-black shadow-md' : 'text-gray-400 hover:text-white'}`}
                          >
                              <BarChartIcon className="w-4 h-4" />
                              สรุปรายเดือน
                          </button>
                      </div>
                  </div>

                  {/* Alert panel inside modal */}
                  {systemDB.storageMode === 'local' ? (
                    <div className="bg-gradient-to-r from-orange-900/40 to-red-900/40 border-b border-orange-500/20 p-4 shrink-0">
                      <div className="flex items-start gap-3">
                        <ShieldAlert className="w-5 h-5 text-orange-400 shrink-0 mt-0.5" />
                        <div className="flex-1">
                          <p className="text-[11px] text-orange-200/90 leading-relaxed mb-1"><strong>โหมดบันทึกลงเครื่อง (Local Storage)</strong></p>
                          <p className="text-[10px] text-orange-200/70 leading-relaxed">
                            {systemDB.authError ? systemDB.authError : 'ข้อมูลถูกเก็บไว้ในเบราว์เซอร์นี้ หากล้างแคชหรือเปลี่ยนเครื่อง ข้อมูลจะสูญหาย (กรุณาใส่ Firebase Config เพื่อใช้ Cloud)'}
                          </p>
                          {auth && (
                             <button onClick={systemDB.handleGoogleSignIn} disabled={systemDB.isAuthLoading} className="w-full mt-2 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg text-[11px] font-bold flex items-center justify-center gap-2 transition-all disabled:opacity-50">
                               <GoogleIcon className="w-4 h-4" /> {systemDB.isAuthLoading ? 'กำลังเชื่อมต่อ...' : 'หรือ ข้ามไปล็อกอินด้วย Google เลย'}
                             </button>
                          )}
                        </div>
                      </div>
                    </div>
                  ) : (systemDB.user && systemDB.user.isAnonymous && (
                    <div className="bg-gradient-to-r from-blue-900/40 to-indigo-900/40 border-b border-blue-500/20 p-4 shrink-0">
                      <div className="flex items-start gap-3">
                        <ShieldAlert className="w-5 h-5 text-blue-400 shrink-0 mt-0.5" />
                        <div className="flex-1">
                          <p className="text-[11px] text-blue-200/90 leading-relaxed mb-3"><strong>บัญชีชั่วคราวบน Cloud</strong> ข้อมูลอาจสูญหายหากคุณเปลี่ยนเบราว์เซอร์ แนะนำให้ผูกบัญชี Google เพื่อเก็บข้อมูลถาวร</p>
                          <button onClick={systemDB.handleGoogleSignIn} disabled={systemDB.isAuthLoading} className="w-full py-2.5 bg-white hover:bg-gray-100 text-black rounded-lg text-[11px] font-bold flex items-center justify-center gap-2 transition-all disabled:opacity-50">
                            <GoogleIcon className="w-4 h-4" /> {systemDB.isAuthLoading ? 'กำลังเชื่อมต่อ...' : 'ผูกบัญชีด้วย Google'}
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}

                  {/* ⚡ Tab-conditional Feed List Content rendering */}
                  <div className="flex-1 overflow-y-auto p-4 history-scroll relative">
                      {!systemDB.isReady ? (
                          <div className="text-center text-white/50 py-10 text-sm">กำลังโหลดข้อมูล...</div>
                      ) : systemDB.history.length === 0 ? (
                          <div className="text-center flex flex-col items-center justify-center h-full text-white/30 space-y-2 py-10">
                             <Wallet className="w-10 h-10 mb-2 opacity-20" />
                             <span className="text-sm font-bold uppercase tracking-widest">ยังไม่มีประวัติการชาร์จ</span>
                          </div>
                      ) : historyTab === 'records' ? (
                          /* Standard Charging Records Feed View */
                          groupedHistory.map((group, gIdx) => (
                              <div key={gIdx} className="mb-6 last:mb-0">
                                  <div className="flex justify-between items-end mb-3 px-2 border-b border-white/10 pb-2 sticky top-0 bg-[#120F24]/90 backdrop-blur-md z-20 pt-2 -mt-2">
                                      <h3 className="text-xs font-bold text-cyan-300 uppercase tracking-widest">{group.label}</h3>
                                      <div className="flex flex-col items-end">
                                          <span className="text-[9px] text-white/40 font-bold uppercase tracking-widest">ยอดรวมเดือนนี้</span>
                                          <span className="text-sm font-black font-mono text-emerald-400">฿{group.total.toFixed(2)}</span>
                                      </div>
                                  </div>
                                  
                                  <div className="space-y-3">
                                      {group.items.map(item => (
                                          <div 
                                              key={item.id} 
                                              onClick={() => {
                                                if (editingId === item.id) return; // Prevent collapse while editing
                                                if (activeItemId === item.id) setActiveItemId(null);
                                                else setActiveItemId(item.id);
                                              }}
                                              className={`border rounded-2xl p-4 relative transition-all duration-300 cursor-pointer ${
                                                activeItemId === item.id 
                                                  ? 'bg-white/5 border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.15)]' 
                                                  : 'bg-black/40 border-white/5 hover:border-white/10'
                                              }`}
                                          >
                                              {/* ⚡ Edited Area Block: Displays Form layout for editing DateTime & Cost */}
                                              {editingId === item.id ? (
                                                  <div className="space-y-4 pt-1" onClick={(e) => e.stopPropagation()}>
                                                      <h4 className="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-2 border-b border-white/5 pb-2">แก้ไขรายการชาร์จ</h4>
                                                      
                                                      {/* 1. Date & Time Input (Datetime-local) */}
                                                      <div>
                                                          <label className="block text-[10px] text-white/40 font-bold mb-1.5 uppercase tracking-wider">วันและเวลาที่ชาร์จ</label>
                                                          <input 
                                                              type="datetime-local" 
                                                              value={editDateTime} 
                                                              onChange={(e) => setEditDateTime(e.target.value)} 
                                                              className="w-full bg-[#050B14] border border-white/10 text-cyan-300 rounded-xl px-3 py-2 font-mono text-sm focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400"
                                                          />
                                                      </div>
                                                      
                                                      {/* 2. Charge Cost Input (Baht) */}
                                                      <div>
                                                          <label className="block text-[10px] text-white/40 font-bold mb-1.5 uppercase tracking-wider">ค่าไฟ (บาท)</label>
                                                          <div className="flex items-center gap-2">
                                                              <span className="text-emerald-500 font-mono text-xl font-bold">฿</span>
                                                              <input 
                                                                  type="number" 
                                                                  step="0.01"
                                                                  value={editCost} 
                                                                  onChange={(e) => {
                                                                    let val = e.target.value;
                                                                    if (val && val.includes('.')) {
                                                                      const parts = val.split('.');
                                                                      if (parts[1].length > 2) val = parts[0] + '.' + parts[1].substring(0, 2);
                                                                    }
                                                                    setEditCost(val);
                                                                  }} 
                                                                  className="w-full bg-[#050B14] border border-white/10 text-emerald-300 rounded-xl px-3 py-2 font-mono text-lg font-bold text-right focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" 
                                                              />
                                                          </div>
                                                      </div>
                                                      
                                                      {/* Edit Actions Buttons */}
                                                      <div className="flex justify-end gap-2 mt-4 pt-3 border-t border-white/5">
                                                          <button onClick={() => { setEditingId(null); setEditCost(""); setEditDateTime(""); }} className="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/70 rounded-lg transition-all text-[10px] font-bold uppercase tracking-widest flex items-center gap-1"><XIcon className="w-3.5 h-3.5" /> ยกเลิก</button>
                                                          <button onClick={async () => {
                                                            if(isUpdating) return; 
                                                            setIsUpdating(true);
                                                            const newTimestamp = new Date(editDateTime).getTime();
                                                            await systemDB.updateRecord(item.id, Number(editCost) || 0, newTimestamp);
                                                            setEditingId(null); 
                                                            setIsUpdating(false);
                                                            setActiveItemId(null);
                                                          }} disabled={isUpdating} className="px-3 py-1.5 bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 rounded-lg border border-emerald-500/30 transition-all text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 disabled:opacity-50"><CheckIcon className="w-3.5 h-3.5" /> บันทึก</button>
                                                      </div>
                                                  </div>
                                              ) : (
                                                  /* Standard View Area */
                                                  <>
                                                      <div className="flex justify-between items-start mb-3">
                                                          <div>
                                                              <div className="text-[10px] text-white/40 font-bold tracking-widest mb-1.5 uppercase">
                                                                  {new Date(item.timestamp).toLocaleDateString('th-TH', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })} น.
                                                              </div>
                                                              <div className="flex items-center gap-2">
                                                                  <span className={`text-[10px] px-2 py-0.5 rounded font-black tracking-widest ${item.chargerType==='DC'?'bg-cyan-500/20 text-cyan-300 border border-cyan-500/20':'bg-fuchsia-500/20 text-fuchsia-300 border border-fuchsia-500/20'}`}>
                                                                      {item.chargerType} {item.power}
                                                                  </span>
                                                                  <span className="text-xs font-bold text-white/80">{item.startSoC}% → {item.targetSoC}%</span>
                                                              </div>
                                                          </div>
                                                          <div className="text-right pl-2">
                                                              <div className="text-lg font-black text-emerald-400 font-mono">฿{Number(item.cost).toFixed(2)}</div>
                                                          </div>
                                                      </div>
                                                      
                                                      {activeItemId === item.id && (
                                                          <div className="flex justify-end gap-2 mt-2 pt-2 border-t border-white/5" onClick={(e) => e.stopPropagation()}>
                                                              <button 
                                                                  onClick={() => { 
                                                                      setEditingId(item.id); 
                                                                      setEditCost(Number(item.cost).toFixed(2));
                                                                      // Set datetime input string taking local timezone into account
                                                                      const d = new Date(item.timestamp);
                                                                      const tzOffset = d.getTimezoneOffset() * 60000;
                                                                      const localISOTime = (new Date(d.getTime() - tzOffset)).toISOString().slice(0, 16);
                                                                      setEditDateTime(localISOTime);
                                                                  }} 
                                                                  className="p-1.5 text-blue-400/80 hover:text-blue-400 hover:bg-blue-500/10 rounded-lg transition-all flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider" 
                                                                  title="แก้ไขรายการ"
                                                              >
                                                                  <EditIcon className="w-4 h-4" /> แก้ไข
                                                              </button>
                                                              <button onClick={() => { systemDB.deleteRecord(item.id); setActiveItemId(null); }} className="p-1.5 text-rose-500/80 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-all flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider" title="ลบรายการ">
                                                                  <TrashIcon className="w-4 h-4" /> ลบ
                                                              </button>
                                                          </div>
                                                      )}
                                                  </>
                                              )}
                                          </div>
                                      ))}
                                  </div>
                              </div>
                          ))
                      ) : (
                          /* ⚡ Tab 2: Highly Polished Monthly Summary Breakdown Tab */
                          <div className="space-y-4">
                              {groupedHistory.map((group, gIdx) => {
                                  // Compute statistics on the fly
                                  const sessionsCount = group.items.length;
                                  const averageCost = sessionsCount > 0 ? (group.total / sessionsCount) : 0;
                                  const estimatedKwh = group.totalKwh;
                                  
                                  return (
                                      <div key={gIdx} className="bg-black/40 border border-white/5 rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                          {/* Decorative monthly card background pattern */}
                                          <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 rounded-full blur-2xl pointer-events-none"></div>
                                          
                                          <div className="flex justify-between items-start mb-4 border-b border-white/5 pb-3">
                                              <div>
                                                  <span className="text-[10px] text-cyan-400 font-bold uppercase tracking-widest block mb-0.5">ยอดสรุปประจำปี</span>
                                                  <h3 className="text-sm font-black text-white">{group.label}</h3>
                                              </div>
                                              <div className="text-right">
                                                  <span className="text-[10px] text-emerald-400/80 font-bold uppercase tracking-widest block mb-0.5">ยอดรวมประจำเดือน</span>
                                                  <span className="text-lg font-black font-mono text-emerald-400">฿{group.total.toFixed(2)}</span>
                                              </div>
                                          </div>
                                          
                                          {/* 2x2 Grid stats breakdown */}
                                          <div className="grid grid-cols-2 gap-4">
                                              <div className="bg-white/5 p-3 rounded-xl border border-white/5 text-center">
                                                  <span className="block text-[9px] text-white/40 font-bold uppercase tracking-widest mb-1">จำนวนครั้งที่ชาร์จ</span>
                                                  <span className="text-sm font-black text-white font-mono">{sessionsCount} <span className="text-xs text-white/60 font-normal font-sans">ครั้ง</span></span>
                                              </div>
                                              <div className="bg-white/5 p-3 rounded-xl border border-white/5 text-center">
                                                  <span className="block text-[9px] text-white/40 font-bold uppercase tracking-widest mb-1">เฉลี่ยต่อครั้ง</span>
                                                  <span className="text-sm font-black text-emerald-400 font-mono">฿{averageCost.toFixed(2)}</span>
                                              </div>
                                              <div className="bg-white/5 p-3 rounded-xl border border-white/5 text-center col-span-2">
                                                  <span className="block text-[9px] text-white/40 font-bold uppercase tracking-widest mb-1">พลังงานไฟฟ้าสะสมที่ได้รับ (ประมาณการ)</span>
                                                  <span className="text-sm font-black text-cyan-300 font-mono">
                                                      {estimatedKwh.toFixed(1)} <span className="text-xs text-cyan-300/60 font-normal font-sans">kWh</span>
                                                  </span>
                                              </div>
                                          </div>
                                      </div>
                                  );
                              })}
                          </div>
                      )}
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script type="module">
    try {
      const source = document.getElementById('jsx-source').textContent;
      const compiled = Babel.transform(source, { 
        presets: [['react', { "runtime": "classic" }]],
        sourceType: "module" 
      }).code;
      const script = document.createElement('script');
      script.type = 'module'; 
      script.text = compiled;
      document.body.appendChild(script);
    } catch (err) {
      console.error("Babel compilation error:", err);
    }
  </script>
</body>
</html>
