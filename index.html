<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geely EX2 Charging Tracker (Full Restored)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background-color: #0B0A1A; color: white; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .history-scroll::-webkit-scrollbar { width: 6px; }
    .history-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
    .history-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script id="jsx-source" type="text/plain">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, linkWithPopup, onAuthStateChanged, signOut, signInWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBIOOnXGxET8lN-K6h-HRX8dyfrYQlLxZc",
      authDomain: "geely-tracker.firebaseapp.com",
      projectId: "geely-tracker",
      storageBucket: "geely-tracker.firebasestorage.app",
      messagingSenderId: "1066830584325",
      appId: "1:1066830584325:web:cf20ac2cb77d9142399a6c",
      measurementId: "G-WVJLH5HPS4"
    };

    let app = null, auth = null, db = null;
    if (MY_FIREBASE_CONFIG.apiKey) {
      try {
        app = initializeApp(MY_FIREBASE_CONFIG);
        auth = getAuth(app);
        db = getFirestore(app);
      } catch(e) { console.error("Firebase Init Error", e); }
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'geely-ex2-github-app';

    const { useState, useEffect, useMemo, useRef, memo } = React;

    const getCurrentTimeStr = () => {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    };

    const EV_SPECS = { CAPACITY: 39.4, MAX_AC_POWER: 6.6, MAX_DC_POWER: 70.0, AC_EFFICIENCY: 0.94, DC_EFFICIENCY: 0.95, TRICKLE_RATE: 0.35, COST_EFFICIENCY: 0.90, VAMPIRE_DRAIN_KW: 0.3 };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const paths = {
        zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
        clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 16 14" /></>,
        wallet: <><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4" /><path d="M4 6v12c0 1.1.9 2 2 2h14v-8" /><path d="M18 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" /></>,
        save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>,
        history: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" /></>,
        trash: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
        check: <polyline points="20 6 9 17 4 12" />,
        x: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
        settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
        shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M12 8v4" /><path d="M12 16h.01" /></>,
        list: <><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /></>,
        chart: <><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></>,
        chevron: <polyline points="6 9 12 15 18 9" />
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name]}
        </svg>
      );
    };

    function useSystemData(onAlertTriggered) {
      const [user, setUser] = useState(null);
      const [history, setHistory] = useState([]);
      const [isReady, setIsReady] = useState(false);
      const [storageMode, setStorageMode] = useState('local'); 
      const [isAuthLoading, setIsAuthLoading] = useState(false);
      const [authError, setAuthError] = useState(null);

      const loadLocalData = () => {
        const savedData = localStorage.getItem('geely_ex2_history');
        if (savedData) { try { setHistory(JSON.parse(savedData)); } catch(e){} }
        setUser({ uid: 'local_user', isAnonymous: true });
        setStorageMode('local');
        setIsReady(true);
      };

      useEffect(() => {
        if (!auth) return loadLocalData();
        return onAuthStateChanged(auth, async (u) => {
          if (u) { setUser(u); setStorageMode('cloud'); setAuthError(null); } 
          else {
            try { await signInAnonymously(auth); } 
            catch (e) { setAuthError(e.message); loadLocalData(); }
          }
        });
      }, []);

      useEffect(() => {
        if (storageMode !== 'cloud' || !user || !db || user.uid === 'local_user') return;
        const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory');
        return onSnapshot(colRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => b.timestamp - a.timestamp);
          setHistory(data);
          setIsReady(true);
        }, () => { setStorageMode('local'); loadLocalData(); });
      }, [user, storageMode]);

      const handleGoogleSignIn = async () => {
        if (!auth) return;
        if (window.self !== window.top) {
          return onAlertTriggered({ title: "คำเตือนความปลอดภัย", message: "โปรดรันบน GitHub Pages โดยตรงเพื่อสิทธิ์ล็อกอิน" });
        }
        setIsAuthLoading(true);
        try {
          const provider = new GoogleAuthProvider();
          auth.currentUser?.isAnonymous ? await linkWithPopup(auth.currentUser, provider) : await signInWithPopup(auth, provider);
        } catch (e) {
          onAlertTriggered({ title: "ข้อผิดพลาด", message: e.message });
        } finally { setIsAuthLoading(false); }
      };

      const addRecord = async (record) => {
        const newRecord = { id: Date.now().toString(), ...record };
        if (storageMode === 'cloud' && db && user?.uid !== 'local_user') {
          try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory'), record); return; } catch(e){}
        }
        const updated = [newRecord, ...history].sort((a,b) => b.timestamp - a.timestamp);
        setHistory(updated);
        localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
      };

      const deleteRecord = async (id) => {
        if (storageMode === 'cloud' && db && user?.uid !== 'local_user') {
          try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id)); return; } catch(e){}
        }
        const updated = history.filter(item => item.id !== id);
        setHistory(updated);
        localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
      };

      const updateRecord = async (id, newCost, newTimestamp) => {
        if (storageMode === 'cloud' && db && user?.uid !== 'local_user') {
          try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chargeHistory', id), { cost: Number(newCost) || 0, timestamp: Number(newTimestamp) || Date.now() }); return; } catch(e){}
        }
        const updated = history.map(item => item.id === id ? { ...item, cost: Number(newCost) || 0, timestamp: Number(newTimestamp) || Date.now() } : item).sort((a,b) => b.timestamp - a.timestamp);
        setHistory(updated);
        localStorage.setItem('geely_ex2_history', JSON.stringify(updated));
      };

      return { user, history, isReady, storageMode, isAuthLoading, authError, handleGoogleSignIn, handleSignOut: () => signOut(auth), addRecord, deleteRecord, updateRecord };
    }

    function useChargeCalculation(currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit, calibVoltage, calibOBC) {
      return useMemo(() => {
        let pwr = 0;
        if (chargerType === 'AC') {
          pwr = acInputMode === 'A' ? (acAmps * 0.94 * calibVoltage) / 1000 : Number(acPower) || 0;
        } else {
          pwr = Number(dcPower) || 0;
        }

        if (currentSoC >= targetSoC) return { hours: 0, minutes: 0, error: "แบตเตอรี่ถึงเป้าหมายแล้ว", actualPower: 0, bottleneck: null, cost: 0 };
        if (pwr <= 0) return { hours: 0, minutes: 0, error: "ข้อมูลกำลังไฟไม่ถูกต้อง", actualPower: 0, bottleneck: null, cost: 0 };

        const energyNeeded = EV_SPECS.CAPACITY * ((targetSoC - currentSoC) / 100);
        let maxCap = chargerType === 'AC' ? EV_SPECS.MAX_AC_POWER : EV_SPECS.MAX_DC_POWER;
        let actualPower = Math.min(pwr, maxCap);
        let bottleneck = pwr > maxCap ? `รถรับไฟได้สูงสุด ${maxCap} kW` : 'จำกัดตามกำลังเครื่องชาร์จ';

        let timeHours = 0;
        if (chargerType === 'AC') {
          const eff = calibOBC / 100;
          if (currentSoC < 90) timeHours += (EV_SPECS.CAPACITY * ((Math.min(targetSoC, 90) - currentSoC) / 100)) / (actualPower * eff);
          if (targetSoC > 90) timeHours += (EV_SPECS.CAPACITY * ((targetSoC - Math.max(currentSoC, 90)) / 100)) / (actualPower * eff * 0.85);
        } else {
          const effDc = actualPower * EV_SPECS.DC_EFFICIENCY;
          if (targetSoC <= 80) timeHours = energyNeeded / effDc;
          else if (currentSoC >= 80) timeHours = energyNeeded / (effDc * EV_SPECS.TRICKLE_RATE);
          else timeHours = ((EV_SPECS.CAPACITY * ((80 - currentSoC) / 100)) / effDc) + ((EV_SPECS.CAPACITY * ((targetSoC - 80) / 100)) / (effDc * EV_SPECS.TRICKLE_RATE));
        }

        const totalMins = Math.round(timeHours * 60);
        const cost = ((energyNeeded / EV_SPECS.COST_EFFICIENCY) + (timeHours * EV_SPECS.VAMPIRE_DRAIN_KW)) * (Number(pricePerUnit) || 0);

        return { hours: Math.floor(totalMins / 60), minutes: totalMins % 60, actualPower, bottleneck, error: null, cost };
      }, [currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit, calibVoltage, calibOBC]);
    }

    const GaugeCanvas = memo(({ currentSoC, targetSoC, chargerType }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        const ctx = canvasRef.current?.getContext('2d');
        if (!ctx) return;
        const w = 320, h = 160, dpr = window.devicePixelRatio || 1;
        canvasRef.current.width = w * dpr; canvasRef.current.height = h * dpr;
        ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

        const cx = w / 2, cy = h - 10, r = w / 2 - 30;
        const grad = ctx.createLinearGradient(0, cy, w, cy);
        grad.addColorStop(0, '#06b6d4'); grad.addColorStop(0.5, '#8b5cf6'); grad.addColorStop(1, '#ec4899');

        ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, 0); ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
        
        const cAngle = Math.PI + (Math.PI * (currentSoC / 100));
        ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, cAngle); ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.strokeStyle = grad; 
        ctx.shadowColor = '#ec4899'; ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0;

        if (targetSoC > currentSoC) {
          const tAngle = Math.PI + (Math.PI * (targetSoC / 100));
          ctx.beginPath(); ctx.arc(cx, cy, r, cAngle, tAngle); ctx.lineWidth = 18; ctx.setLineDash([4, 4]);
          const forecastGrad = ctx.createLinearGradient(0, 0, w, 0);
          forecastGrad.addColorStop(0, '#a855f7'); forecastGrad.addColorStop(1, targetSoC > 80 ? '#fb923c' : '#ec4899');
          ctx.strokeStyle = forecastGrad; ctx.stroke(); ctx.setLineDash([]);
        }

        if (chargerType === 'DC') {
          const markerAngle = Math.PI + (Math.PI * 0.8);
          const mx = cx + Math.cos(markerAngle) * (r - 14), my = cy + Math.sin(markerAngle) * (r - 14);
          const mox = cx + Math.cos(markerAngle) * (r + 14), moy = cy + Math.sin(markerAngle) * (r + 14);
          ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mox, moy); ctx.lineWidth = 4; ctx.strokeStyle = '#f43f5e'; ctx.shadowColor = '#f43f5e'; ctx.shadowBlur = 8; ctx.stroke(); ctx.shadowBlur = 0;
          ctx.fillStyle = '#fca5a5'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('BMS LIMIT', mox + 24, moy - 4);
        }
      }, [currentSoC, targetSoC, chargerType]);

      return <canvas ref={canvasRef} className="w-full max-w-[320px] aspect-[2/1] z-10 drop-shadow-2xl" />;
    });

    const AppAlertModal = ({ alertData, onClose }) => {
      if (!alertData) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
          <div className="bg-[#18152e] border border-white/10 rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl">
            <h4 className="text-lg font-black text-rose-400 mb-2">{alertData.title}</h4>
            <p className="text-gray-300 text-sm whitespace-pre-wrap mb-6">{alertData.message}</p>
            <button onClick={onClose} className="w-full py-2.5 bg-cyan-500 text-black font-bold rounded-xl text-sm">ตกลง</button>
          </div>
        </div>
      );
    };

    function App() {
      const [appAlert, setAppAlert] = useState(null);
      const systemDB = useSystemData(setAppAlert);
      
      const [showHistory, setShowHistory] = useState(false);
      const [showCalib, setShowCalib] = useState(false);
      const [calibVoltage, setCalibVoltage] = useState(229); 
      const [calibOBC, setCalibOBC] = useState(94); 

      const [currentSoC, setCurrentSoC] = useState(62);
      const [targetSoC, setTargetSoC] = useState(100);
      const [chargerType, setChargerType] = useState('AC');
      const [dcPower, setDcPower] = useState(120);
      const [acPower, setAcPower] = useState(7);
      const [acInputMode, setAcInputMode] = useState('A'); 
      const [acAmps, setAcAmps] = useState(10); 
      const [scheduleMode, setScheduleMode] = useState('START_AT'); 
      const [targetTime, setTargetTime] = useState('06:30'); 
      const [userStartTime, setUserStartTime] = useState(getCurrentTimeStr()); 
      const [pricePerUnit, setPricePerUnit] = useState(4.5);

      const [historyTab, setHistoryTab] = useState("records");
      const [expandedMonthKey, setExpandedMonthKey] = useState(null);
      const [activeItemId, setActiveItemId] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [editCost, setEditCost] = useState("");
      const [editDateTime, setEditDateTime] = useState("");
      const [isSaving, setIsSaving] = useState(false);

      const calcDetails = useChargeCalculation(currentSoC, targetSoC, chargerType, dcPower, acPower, acInputMode, acAmps, pricePerUnit, calibVoltage, calibOBC);

      const groupedHistory = useMemo(() => {
        const groups = {};
        systemDB.history.forEach(item => {
          const date = new Date(item.timestamp);
          const monthYear = date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
          const sortKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;

          if (!groups[sortKey]) groups[sortKey] = { key: sortKey, label: monthYear, items: [], total: 0, totalKwh: 0 };
          groups[sortKey].items.push(item);
          groups[sortKey].total += Number(item.cost) || 0;
          groups[sortKey].totalKwh += (Number(item.cost) || 0) / (Number(item.pricePerUnit) || 4.5);
        });

        return Object.entries(groups).sort(([a], [b]) => b.localeCompare(a)).map(([_, v]) => v);
      }, [systemDB.history]);

      const currentMonthKey = useMemo(() => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      }, []);

      const currentMonthGroup = useMemo(() => groupedHistory.find(g => g.key === currentMonthKey), [groupedHistory, currentMonthKey]);
      const currentMonthLabel = useMemo(() => new Date().toLocaleDateString('th-TH', { month: 'long', year: 'numeric' }), []);

      const schedule = useMemo(() => {
        if (calcDetails.error || (!calcDetails.hours && !calcDetails.minutes)) return null;
        const totalChargeMinutes = (calcDetails.hours * 60) + calcDetails.minutes;
        if (scheduleMode === 'FINISH_BY') {
          const [tH, tM] = targetTime.split(':').map(Number);
          let startMins = (tH * 60 + tM) - totalChargeMinutes;
          let offset = '';
          if (startMins < 0) { startMins = (24 * 60) + (startMins % (24 * 60)); offset = '(คืนก่อนหน้า)'; }
          return {
            inputLabel: `ต้องการใช้รถเวลา (${targetSoC}%)`, outputLabel: 'ตั้งเวลาเริ่มชาร์จ (ในแอพ)',
            outputTime: `${String(Math.floor(startMins / 60) % 24).padStart(2, '0')}:${String(startMins % 60).padStart(2, '0')}`, dayOffset: offset,
            inputValue: targetTime, setInputValue: setTargetTime
          };
        } else {
          const [sH, sM] = userStartTime.split(':').map(Number);
          let endMins = (sH * 60 + sM) + totalChargeMinutes;
          return {
            inputLabel: 'เสียบสายเริ่มชาร์จเวลา', outputLabel: `ชาร์จเสร็จถึงเป้า (${targetSoC}%)`,
            outputTime: `${String(Math.floor(endMins / 60) % 24).padStart(2, '0')}:${String(endMins % 60).padStart(2, '0')}`,
            dayOffset: endMins >= 24 * 60 ? '(วันถัดไป)' : '', inputValue: userStartTime, setInputValue: setUserStartTime
          };
        }
      }, [calcDetails, targetTime, userStartTime, scheduleMode, targetSoC]);

      const handleSaveSession = async () => {
        if (!systemDB.user || calcDetails.error || isSaving) return;
        setIsSaving(true);
        await systemDB.addRecord({
          timestamp: Date.now(),
          cost: calcDetails.cost,
          startSoC: currentSoC,
          targetSoC,
          chargerType,
          power: chargerType === 'AC' ? (acInputMode === 'A' ? `${acAmps}A` : `${acPower}kW`) : `${dcPower}kW`,
          pricePerUnit
        });
        setTimeout(() => setIsSaving(false), 500);
      };

      const acPresets = [ {label: 'บ้าน Off-Peak', val: 2.6}, {label: 'ไฟบ้านปกติ', val: 4.5}, {label: 'บ้าน On-Peak', val: 5.8}, {label: 'AC สาธารณะ', val: 5.9} ];

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-[#0B0A1A] bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-fuchsia-900/40 via-[#0B0A1A] to-cyan-900/30">
          <AppAlertModal alertData={appAlert} onClose={() => setAppAlert(null)} />
          
          <div className="bg-[#120F24]/60 backdrop-blur-3xl w-full max-w-md rounded-[32px] border border-white/10 overflow-hidden relative p-6 space-y-6 shadow-[0_0_80px_-20px_rgba(236,72,153,0.3)]">
            
            {/* Header */}
            <div className="flex justify-between items-center border-b border-white/5 pb-4">
              <div>
                <h1 className="text-2xl font-black flex items-center gap-2">
                  <Icon name="zap" className="w-6 h-6 text-fuchsia-400 drop-shadow-[0_0_12px_rgba(236,72,153,0.8)]" />
                  <span className="bg-clip-text text-transparent bg-gradient-to-r from-cyan-300 via-fuchsia-400 to-pink-500">Geely EX2</span>
                </h1>
                <p className="text-[10px] text-purple-200/60 uppercase font-bold tracking-wider">HyperCharge Tracker</p>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setShowCalib(!showCalib)} className={`p-2.5 rounded-xl border transition-all ${showCalib ? 'bg-fuchsia-500/20 border-fuchsia-500/50 text-fuchsia-300' : 'bg-white/5 border-white/10 text-cyan-300'}`} title="ตั้งค่าปรับแต่งวิศวกรรมไฟฟ้า">
                  <Icon name="settings" />
                </button>
                <button onClick={() => { setShowHistory(true); setActiveItemId(null); }} className="p-2.5 bg-white/5 rounded-xl border border-white/10 text-cyan-300 relative">

                    <div>
                      <div className="flex justify-between text-xs font-bold text-cyan-300 uppercase border-b border-white/10 pb-2 mb-3">
                        <span>เดือนปัจจุบัน ({currentMonthLabel})</span>
                        <span className="font-mono text-emerald-400 font-bold">฿{currentMonthGroup ? currentMonthGroup.total.toFixed(2) : "0.00"}</span>
                      </div>
                      {!currentMonthGroup || currentMonthGroup.items.length === 0 ? (
                        <div className="text-center text-white/30 py-12 text-xs">ไม่มีรายการชาร์จในเดือนนี้</div>
                      ) : (
                        currentMonthGroup.items.map(item => {
                          const isEditing = editingId === item.id;
                          const isFocused = activeItemId === item.id;
                          return (
                            <div key={item.id} onClick={() => !isEditing && setActiveItemId(isFocused ? null : item.id)} className={`p-3.5 rounded-2xl border transition-all cursor-pointer mb-2 ${isFocused ? 'bg-white/5 border-amber-500/50' : 'bg-black/40 border-white/5'}`}>
                              {isEditing ? (
                                <div className="space-y-3" onClick={(e) => e.stopPropagation()}>
                                  <h4 className="text-xs font-bold text-amber-400 uppercase">แก้ไขรายการชาร์จ</h4>
                                  <input type="datetime-local" value={editDateTime} onChange={(e) => setEditDateTime(e.target.value)} className="w-full bg-[#050B14] border border-white/10 text-amber-300 rounded-xl px-3 py-1.5 text-xs font-mono" />
                                  <div className="flex items-center gap-2">
                                    <span className="text-amber-400 font-bold">฿</span>
                                    <input type="number" step="0.01" value={editCost} onChange={(e) => setEditCost(e.target.value)} className="w-full bg-[#050B14] border border-white/10 text-amber-300 rounded-xl px-3 py-1.5 text-right font-mono text-sm font-bold" />
                                  </div>
                                  <div className="flex justify-end gap-2 pt-2">
                                    <button onClick={() => setEditingId(null)} className="px-3 py-1 bg-white/10 text-xs rounded-lg">ยกเลิก</button>
                                    <button onClick={async () => {
                                      const ts = new Date(editDateTime).getTime();
                                      await systemDB.updateRecord(item.id, Number(editCost)||0, ts);
                                      setEditingId(null); setActiveItemId(null);
                                    }} className="px-3 py-1 bg-amber-500/20 text-amber-300 border border-amber-500/30 text-xs rounded-lg font-bold">บันทึก</button>
                                  </div>
                                </div>
                              ) : (
                                <>
                                  <div className="flex justify-between items-start">
                                    <div>
                                      <div className="text-[10px] text-white/40 font-bold uppercase mb-1">{new Date(item.timestamp).toLocaleDateString('th-TH', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })} น.</div>
                                      <div className="flex items-center gap-2">
                                        <span className={`text-[9px] px-1.5 py-0.5 rounded font-black ${item.chargerType==='DC'?'bg-cyan-500/20 text-cyan-300':'bg-fuchsia-500/20 text-fuchsia-300'}`}>{item.chargerType} {item.power}</span>
                                        <span className="text-xs font-bold text-white/80">{item.startSoC}% → {item.targetSoC}%</span>
                                      </div>
                                    </div>
                                    {/* 🟡 Individual Session Amount: High-Contrast Amber Gold (#fcd34d) */}
                                    <span className="text-lg font-black text-amber-300 font-mono drop-shadow-[0_0_10px_rgba(251,191,36,0.3)]">฿{Number(item.cost).toFixed(2)}</span>
                                  </div>
                                  {isFocused && (
                                    <div className="flex justify-end gap-2 mt-2 pt-2 border-t border-white/5" onClick={(e) => e.stopPropagation()}>
                                      <button onClick={() => {
                                        setEditingId(item.id); setEditCost(Number(item.cost).toFixed(2));
                                        const d = new Date(item.timestamp);
                                        const tz = d.getTimezoneOffset() * 60000;
                                        setEditDateTime((new Date(d.getTime() - tz)).toISOString().slice(0, 16));
                                      }} className="p-1 text-blue-400 flex items-center gap-1 text-[10px] uppercase font-bold"><Icon name="edit" className="w-3.5 h-3.5" /> แก้ไข</button>
                                      <button onClick={() => { systemDB.deleteRecord(item.id); setActiveItemId(null); }} className="p-1 text-rose-400 flex items-center gap-1 text-[10px] uppercase font-bold"><Icon name="trash" className="w-3.5 h-3.5" /> ลบ</button>
                                    </div>
                                  )}
                                </>
                              )}
                            </div>
                          );
                        })
                      )}
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {groupedHistory.map(group => {
                        const count = group.items.length;
                        const avg = count > 0 ? group.total / count : 0;
                        const isExpanded = expandedMonthKey === group.key;
                        return (
                          <div key={group.key} className="bg-black/40 border border-white/5 rounded-2xl overflow-hidden">
                            <div onClick={() => setExpandedMonthKey(isExpanded ? null : group.key)} className="p-4 flex justify-between items-center cursor-pointer hover:bg-white/5">
                              <div>
                                <span className="text-[9px] text-cyan-400 font-bold uppercase block">สรุปรายเดือน</span>
                                <h3 className="text-sm font-black">{group.label}</h3>
                              </div>
                              <div className="flex items-center gap-2">
                                {/* 🟢 Monthly Group Total: Emerald Green */}
                                <span className="text-base font-black font-mono text-emerald-400">฿{group.total.toFixed(2)}</span>
                                <Icon name="chevron" className={`w-4 h-4 text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                              </div>
                            </div>
                            <div className="p-3 bg-[#17142e]/30 grid grid-cols-2 gap-2 text-center text-xs border-t border-white/5">
                              <div className="bg-white/5 p-2 rounded-xl">
                                <span className="block text-[8px] text-white/40 uppercase">จำนวนครั้ง</span>
                                <span className="font-bold font-mono">{count} ครั้ง</span>
                              </div>
                              <div className="bg-white/5 p-2 rounded-xl">
                                <span className="block text-[8px] text-white/40 uppercase">เฉลี่ยต่อครั้ง</span>
                                {/* 🟡 Average Amount: Amber Gold */}
                                <span className="font-bold font-mono text-amber-300">฿{avg.toFixed(2)}</span>
                              </div>
                            </div>
                            {isExpanded && (
                              <div className="p-3 bg-[#0a0815]/60 space-y-2">
                                <h4 className="text-[10px] text-cyan-400 font-bold uppercase">รายการชาร์จทั้งหมด</h4>
                                {group.items.map(item => (
                                  <div key={item.id} className="p-2 bg-black/40 rounded-xl text-xs flex justify-between">
                                    <span>{new Date(item.timestamp).toLocaleDateString('th-TH')} ({item.startSoC}% → {item.targetSoC}%)</span>
                                    {/* 🟡 Individual Session Amount in drill-down: Amber Gold */}
                                    <span className="font-mono text-amber-300 font-bold">฿{Number(item.cost).toFixed(2)}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script type="module">
    try {
      const source = document.getElementById('jsx-source').textContent;
      const compiled = Babel.transform(source, { presets: [['react', { "runtime": "classic" }]], sourceType: "module" }).code;
      const script = document.createElement('script'); script.type = 'module'; script.text = compiled;
      document.body.appendChild(script);
    } catch (e) { console.error("Babel compilation error:", e); }
  </script>
</body>
